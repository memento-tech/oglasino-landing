<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oglasino</title>
    <link rel="icon" href="/favicon.ico" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="m-0 p-0">
    <div class="flex h-screen w-full">
      <div class="relative hidden md:block md:w-1/2">
        <img
          src="/intro.jpg"
          class="h-full w-full object-cover"
          alt="Oglasino intro"
        />
        <div class="absolute inset-0 bg-black/30"></div>
      </div>

      <div class="relative flex-1 overflow-auto bg-white">
        <div class="absolute top-0 h-screen w-full md:hidden">
          <img
            src="/intro.jpg"
            class="h-full w-full object-cover opacity-70"
            alt="Oglasino intro"
          />
        </div>

        <div
          class="absolute -top-20 -right-20 h-96 w-96 rounded-full bg-blue-200 opacity-30 blur-3xl"
        ></div>
        <div
          class="absolute bottom-0 left-0 h-72 w-72 rounded-full bg-indigo-300 opacity-30 blur-3xl"
        ></div>

        <div
          class="relative z-10 mx-auto flex min-h-full max-w-xl flex-col px-6 py-6 md:px-10"
        >
          <div
            class="mt-auto mb-auto flex w-full flex-col items-center text-center"
          >
            <div
              class="flex flex-col items-center rounded-xl border border-white/40 bg-white/90 px-6 py-6 shadow-lg backdrop-blur-md md:bg-white/70"
            >
              <img
                src="/light-oglasino-full.png"
                alt="Oglasino logo"
                class="h-[150px] w-[400px] object-cover"
              />
              <div class="mt-0">
                <div
                  class="h-10 w-10 animate-spin rounded-full border-4 border-orange-200 border-t-blue-500"
                ></div>
              </div>
              <div class="mt-4 flex flex-col items-center">
                <p class="text-2xl font-semibold text-gray-900 italic">
                  Uskoro
                </p>

                <p class="mt-1 text-base text-gray-700 italic">Coming soon</p>

                <p class="mt-1 text-sm text-gray-400 italic">
                  Скоро будет доступна
                </p>
              </div>
            </div>
          </div>
        </div>

        <div class="absolute bottom-1 w-full text-center text-xs text-black">
          © <span id="year"></span> Memento Tech
        </div>
      </div>
    </div>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
